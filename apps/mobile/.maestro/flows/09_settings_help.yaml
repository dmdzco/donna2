# Flow 09: Settings — Help Center
# Verifies: All help links, FAQ/What's New alerts, feedback modals

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro+clerk_test@getdonna.ai"
  TEST_PASSWORD: "Maestro2026!"

---

- runFlow: ../subflows/sign_in.yaml
- runFlow: ../subflows/navigate_to_settings.yaml
- tapOn: "Help Center"

- assertVisible: "Help Center"

# Help section
- assertVisible: "FAQ"
- assertVisible: "What's New"
- assertVisible: "Contact Support"

# Feedback section
- assertVisible: "Report a Problem"
- assertVisible: "Make a Suggestion"

# About section
- assertVisible: "Privacy Policy"
- assertVisible: "Third Party Services"

# Test FAQ alert (native iOS Alert — body text not accessible to Maestro, verify via OK button)
- tapOn:
    text: "FAQ"
    index: 0
- extendedWaitUntil:
    visible: "OK"
    timeout: 5000
- tapOn: "OK"

# Test What's New alert (same — verify alert appeared via OK button)
- tapOn: "What's New"
- extendedWaitUntil:
    visible: "OK"
    timeout: 5000
- tapOn: "OK"

# Test Contact Support modal (bottom-sheet with Close button)
- tapOn:
    text: "Contact Support"
    index: 0
- extendedWaitUntil:
    visible: "Submit"
    timeout: 3000
- tapOn: "Close"

# Test Report a Problem modal
- tapOn: "Report a Problem"
- extendedWaitUntil:
    visible: "Submit"
    timeout: 3000
- tapOn: "Close"

# Test Make a Suggestion modal
- tapOn: "Make a Suggestion"
- extendedWaitUntil:
    visible: "Submit"
    timeout: 3000
- tapOn: "Close"

# Navigate back to settings root
- tapOn: "Go back"
- extendedWaitUntil:
    visible: "Manage your account and preferences"
    timeout: 5000

- takeScreenshot: 09_help
