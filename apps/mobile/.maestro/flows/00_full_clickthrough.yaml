# Flow 00: Full Clickthrough (Stay Logged In)
# Signs in once → exercises every tab and feature → signs out at end
#
# KEY LEARNINGS (from previous test runs):
#   - Input component: label <Text> is accessible={false}, so tapOn by original
#     case (e.g., "Call Title") targets the TextInput directly.
#   - hideKeyboard fails on iOS — use pressKey:enter for single-line fields,
#     or tap a non-interactive heading for phone-pad keyboards.
#   - Modal title and save button share text — use index: 1 for the button.
#   - Do NOT use scrollUntilVisible inside modals.
#   - Native iOS Alert body text is NOT accessible — only check buttons (OK/Cancel).
#   - Settings sub-screens: back button has accessibilityLabel="Go back".

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro+clerk_test@getdonna.ai"
  TEST_PASSWORD: "Maestro2026!"

---

# ═══════════════════════════════════════
# SIGN IN
# ═══════════════════════════════════════
- runFlow: ../subflows/sign_in.yaml

# ═══════════════════════════════════════
# 1. DASHBOARD
# ═══════════════════════════════════════
- assertVisible: "Dashboard, tab.*"
- assertVisible: "Hello.*"
- assertVisible: "Next call:.*"
- assertVisible: "Recent Call Highlights"

# Floating call button + instant call modal
- assertVisible: "Call.*now"
- tapOn: "Call.*now"
- assertVisible: "Instant Call"
- tapOn: "Close"
- assertVisible: "Dashboard, tab.*"
- takeScreenshot: 00_01_dashboard

# ═══════════════════════════════════════
# 2. SCHEDULE TAB
# ═══════════════════════════════════════
- tapOn: "Schedule, tab.*"

# Week view header (current day name)
- assertVisible:
    text: "Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday"

# Week navigation
- assertVisible: "Previous week"
- assertVisible: "Next week"
- tapOn: "Next week"
- tapOn: "Previous week"

# --- Open add call modal, verify it works, close without saving ---
- tapOn: "Add new call"
- assertVisible: "Add Call"

# Type call title (use testID to reliably target the TextInput)
- tapOn:
    id: "call-title-input"
- eraseText: 30
- inputText: "E2E Clickthrough Call"
- pressKey: enter

# Schedule create/edit/delete is covered in flow 03. Avoid persisting an
# extra live E2E call from this broad clickthrough.
- tapOn: "Close"

- takeScreenshot: 00_02_schedule

# ═══════════════════════════════════════
# 3. REMINDERS TAB
# ═══════════════════════════════════════
- tapOn: "Reminders, tab.*"

- extendedWaitUntil:
    visible: "Add New Reminder"
    timeout: 5000
- assertVisible: "Reminders"
- assertVisible: "Manage what Donna reminds.*about"

# --- Open add reminder modal, verify it works, close ---
- tapOn: "Add New Reminder"
- extendedWaitUntil:
    visible: "Add Reminder"
    timeout: 5000

# Type a title (autoFocus focuses the input automatically)
- inputText: "E2E Clickthrough Reminder"
- pressKey: enter

# Close modal without saving (avoids API-dependent failure)
- tapOn: "Close"

- takeScreenshot: 00_03_reminders

# ═══════════════════════════════════════
# 4. SETTINGS TAB
# ═══════════════════════════════════════
- tapOn: "Settings, tab.*"
- assertVisible: "Manage your account and preferences"

# Verify all settings rows
- assertVisible: "Loved One Profile"
- assertVisible: "Caregiver Profile"
- assertVisible: "Notification Preferences"
- assertVisible: "Help Center"

# --- Visit Loved One Profile ---
- tapOn: "Loved One Profile"
- extendedWaitUntil:
    visible: "Go back"
    timeout: 5000
- takeScreenshot: 00_04_loved_one
- tapOn: "Go back"

# --- Visit Caregiver Profile ---
- tapOn: "Caregiver Profile"
- extendedWaitUntil:
    visible: "Go back"
    timeout: 5000
- takeScreenshot: 00_05_caregiver
- tapOn: "Go back"

# --- Visit Notification Preferences ---
- tapOn: "Notification Preferences"
- extendedWaitUntil:
    visible: "Go back"
    timeout: 5000
- takeScreenshot: 00_06_notifications
- tapOn: "Go back"

# --- Visit Help Center ---
- tapOn: "Help Center"
- extendedWaitUntil:
    visible: "Go back"
    timeout: 5000

# Tap FAQ → dismiss alert
- tapOn:
    text: "FAQ"
    index: 0
- extendedWaitUntil:
    visible: "OK"
    timeout: 5000
- tapOn: "OK"

- takeScreenshot: 00_07_help
- tapOn: "Go back"

# ═══════════════════════════════════════
# 5. SIGN OUT (verify modal only — Clerk signOut() hangs in test env)
# ═══════════════════════════════════════
# Scroll to Sign Out button in settings (may be below the fold)
- scrollUntilVisible:
    element: "Sign Out"
    direction: DOWN
- tapOn: "Sign Out"

# Verify confirmation modal appears with both buttons
- extendedWaitUntil:
    visible: "Cancel"
    timeout: 5000

# Verify destructive button exists via testID
- assertVisible:
    id: "sign-out-confirm"

# Dismiss modal (don't actually sign out — Clerk API hangs in dev/test)
- tapOn: "Cancel"

- takeScreenshot: 00_08_sign_out_modal
