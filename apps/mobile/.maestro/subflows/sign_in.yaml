# Reusable sign-in subflow
# Expects: TEST_EMAIL, TEST_PASSWORD env vars set by calling flow or .env
# Starts from: Any state
# Ends at: Dashboard (tabs) or Onboarding step 1
#
# Clerk test mode: +clerk_test emails auto-verify with code 424242
# Maestro must enter any second-factor code through the same visible field users see.

appId: com.donna.caregiver

---

# Kill app process + clear keychain (sign-out) but NOT clearState
# clearState wipes Metro bundler cache in dev builds → app won't load
- stopApp
- launchApp:
    clearKeychain: true

# Wait for landing page (clearKeychain signs user out → landing page)
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 15000

# In dev-client simulator builds, the first tap can wake GestureHandlerRootView
# without navigating. A second optional tap mirrors what a user would do when the
# visible Sign In button did not respond.
- tapOn:
    id: "landing-sign-in"
- tapOn:
    id: "landing-sign-in"
    optional: true
- runFlow:
    when:
      visible: "Donna"
    commands:
      # Maestro can report the ID tap as completed while iOS ignores it. This
      # taps the visible Sign In button center, not random empty screen space.
      - tapOn:
          point: "50%,92%"

# Wait for sign-in screen to render
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 10000

# Dismiss any leftover alert from a previous failed run
- tapOn:
    text: "OK"
    optional: true

# Email — tap to focus and type
- tapOn:
    id: "sign-in-email"
- eraseText: 50
- inputText: ${TEST_EMAIL}

# Password
- tapOn:
    id: "sign-in-password"
- inputText: ${TEST_PASSWORD}

# Submit via the Sign In button (testID: sign-in-submit)
# Fallback: pressKey Enter triggers onSubmitEditing={handleSignIn}
- tapOn:
    id: "sign-in-submit"

# Wait for Clerk auth to either complete or ask for a visible second factor.
- extendedWaitUntil:
    visible: "Save Password\\?|Hello.*|About You|Choose Verification Method|Verification Code"
    timeout: 90000

# If iOS asks to save the test password, dismiss the system prompt.
- runFlow:
    when:
      visible: "Save Password\\?"
    commands:
      - tapOn: "Not Now"

# If Clerk offers multiple factors, choose the test-account email code path.
- runFlow:
    when:
      visible: "Choose Verification Method"
    commands:
      - tapOn:
          text: "Email code.*"
      - extendedWaitUntil:
          visible: "Verification Code"
          timeout: 15000

# If a second factor is required, enter the Clerk test code through the visible input.
- runFlow:
    when:
      visible: "Verification Code"
    commands:
      - tapOn:
          id: "auth-verification-code"
      - runFlow:
          file: tap_digits.yaml
          env:
            DIGITS: "424242"
      - tapOn:
          id: "auth-verification-submit"

# Landing destinations: "Hello" greeting (returning user) or "About You" (fresh user).
- extendedWaitUntil:
    visible: "Hello.*|About You"
    timeout: 90000
