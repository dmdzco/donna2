# Flow 03: Schedule Tab
# Verifies: Tab navigation, week view, week navigation, add/edit/delete call
#
# KEY LEARNINGS:
#   - Input component: label <Text> and <TextInput> share same accessibilityLabel.
#     BUT textTransform:uppercase on the label makes its accessibility text uppercase
#     ("CALL TITLE") while TextInput keeps original case ("Call Title"). So tapOn
#     by original case targets the TextInput directly — no index needed.
#   - hideKeyboard fails on iOS. Use pressKey:enter (single-line) or tap a
#     non-interactive element (multiline/phone-pad) to dismiss.
#   - Do NOT use scrollUntilVisible inside modals — it scrolls the background.
#   - Modal title text and save button share the same text. Use index: 1 for button.

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro+clerk_test@getdonna.ai"
  TEST_PASSWORD: "Maestro2026!"

---

- runFlow: ../subflows/sign_in.yaml

# Navigate to Schedule tab
- tapOn: "Schedule, tab.*"

# Week view header shows the current full day name (e.g. "Saturday")
- assertVisible:
    text: "Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday"

# Week navigation arrows
- assertVisible: "Previous week"
- assertVisible: "Next week"

# Navigate forward and back
- tapOn: "Next week"
- tapOn: "Previous week"

# --- Add a new call ---
- tapOn: "Add new call"
- assertVisible: "Add Call"

# Type call title (use testID to reliably target the TextInput)
- tapOn:
    id: "call-title-input"
- eraseText: 30
- inputText: "E2E Test Call"
- pressKey: enter

# Save the call (index 1: skip modal title "Add Call", hit save button)
- tapOn:
    text: "Add Call"
    index: 1

# Verify new call card appears in the schedule list
- extendedWaitUntil:
    visible: "E2E Test Call"
    timeout: 10000

# --- Edit the call ---
- tapOn: "Edit E2E Test Call"
- extendedWaitUntil:
    visible: "Edit Call"
    timeout: 5000

# Change context notes (unique accessibilityLabel — no index issue)
- tapOn: "Context notes"
- inputText: "Updated E2E context"
- pressKey: enter

# Save
- tapOn: "Save Changes"

# Wait for modal to close
- extendedWaitUntil:
    visible: "E2E Test Call"
    timeout: 5000

# --- Delete the test call (cleanup) ---
- tapOn: "Edit E2E Test Call"
- extendedWaitUntil:
    visible: "Edit Call"
    timeout: 5000
- tapOn: "Delete Call"

# Confirmation modal
- assertVisible: "Are you sure you want to delete this scheduled call?"
- tapOn:
    text: "Delete"
    index: 0

# Verify the card is gone
- extendedWaitUntil:
    notVisible: "E2E Test Call"
    timeout: 5000

- takeScreenshot: 03_schedule
