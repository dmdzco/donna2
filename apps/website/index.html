    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Donna",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "iOS",
      "description": "Donna is an AI assistant that calls your aging loved ones every day, providing warm conversation, medication reminders, and post-call summaries for caregivers.",
      "offers": {
        "@type": "Offer",
        "price": "19.00",
        "priceCurrency": "USD",
        "priceValidUntil": "2027-12-31"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "1"
      }
    }
    </script>

    <!-- FAQ Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Donna?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Donna is an AI assistant that calls your elderly loved ones as often as you choose. She has warm, natural conversations, delivers reminders, and sends you a summary after every call — so you always know your parent is okay."
          }
        },
        {
          "@type": "Question",
          "name": "Does Donna sound like a robot?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Not at all. Donna uses advanced voice AI that sounds natural and warm. She listens, responds thoughtfully, remembers past conversations, and gets more familiar over time. Most people find her easy and enjoyable to talk to."
          }
        },
        {
          "@type": "Question",
          "name": "What if my parent doesn't pick up?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "If your parent doesn't pick up, Donna will notify you in the app that the call was missed. You can redial them on Donna's behalf, and they are also able to call Donna directly. If you don't want notifications for missed calls, you can disable them in the 'Settings' tab under 'Preferences'."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel anytime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, absolutely. There are no contracts or commitments. You can cancel anytime directly from the app."
          }
        },
        {
          "@type": "Question",
          "name": "What does a typical call look like?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Calls typically last 1 to 15 minutes. Donna checks in on how they're feeling, chats about their interests and daily life, delivers any reminders you've set, and wraps up warmly. Afterwards, a summary appears in your app. Some seniors just like to get quick reminders and/or answer Donna so that their family knows they're doing alright – others love to chat for hours a week and find it far more fun than watching TV or just sitting around. There's no right way to use Donna!"
          }
        },
        {
          "@type": "Question",
          "name": "How soon can calls start after I download the app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Within minutes of completing setup. You enter your loved one's name, phone number, interests, and preferred call time — and Donna starts calling on the schedule you choose."
          }
        },
        {
          "@type": "Question",
          "name": "Is my loved one's information kept private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Donna encrypts sensitive information and does not sell personal data. Donna uses service providers only as needed to operate the service. You can review the privacy policy and third-party services pages at the bottom of this page."
          }
        }
      ]
    }
    </script>
