# Flow 06: Settings — Loved One Profile
# Verifies: Form loads with data, edit fields, save, navigate back

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro+clerk_test@getdonna.ai"
  TEST_PASSWORD: "Maestro2026!"

---

- runFlow: ../subflows/sign_in.yaml
- runFlow: ../subflows/navigate_to_settings.yaml
- tapOn: "Loved One Profile"

# Form fields are visible and pre-filled
- assertVisible: "Name"
- assertVisible: "Phone Number"
- assertVisible: "City"
- assertVisible: "State"

# Edit name field
- tapOn: "Name"
- eraseText: 50
- inputText: "E2E Test Senior"

# Edit phone
- tapOn: "Phone Number"
- eraseText: 50
- inputText: "5551234567"

# Edit city
- tapOn: "City"
- eraseText: 50
- inputText: "Dallas"

# Edit state
- tapOn: "State"
- eraseText: 50
- inputText: "TX"

# Scroll to interests section
- scrollUntilVisible:
    element: "Additional Topics"
    direction: DOWN

# Scroll to topics to avoid
- scrollUntilVisible:
    element: "Topics to Avoid"
    direction: DOWN

# Save changes
- scrollUntilVisible:
    element: "Save Changes"
    direction: DOWN
- tapOn: "Save Changes"

# Wait for save confirmation alert
- extendedWaitUntil:
    visible: "Saved|Profile updated|OK"
    timeout: 10000
- tapOn:
    text: "OK"
    optional: true

# Navigate back
- tapOn: "Go back"
- assertVisible: "Manage your account and preferences"

- takeScreenshot: 06_loved_one
