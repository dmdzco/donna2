# Flow 11: Sign Out
# Verifies: Sign out from settings returns to landing screen
#
# Sign Out modal (centered variant):
#   - Modal title text: "Sign Out"
#   - Body: "Are you sure you want to sign out?..."
#   - Destructive Button: "Sign Out"
#   - Secondary Button: "Cancel"
#
# When modal is open, Maestro sees the modal title text AND the button text.
# The settings page "Sign Out" is also in the tree behind the modal on iOS.
# We scroll to the button, open the modal, then target the destructive button.

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro+clerk_test@calldonna.co"
  TEST_PASSWORD: "Maestro2026!"

---

- runFlow: ../subflows/sign_in.yaml
- runFlow: ../subflows/navigate_to_settings.yaml

# Scroll to and tap Sign Out button in settings (may be below the fold)
- scrollUntilVisible:
    element: "Sign Out"
    direction: DOWN
- tapOn: "Sign Out"

# Wait for confirmation modal
- extendedWaitUntil:
    visible: "Cancel"
    timeout: 5000

# Tap the destructive "Sign Out" button in the modal (by testID to avoid ambiguity)
- tapOn:
    id: "sign-out-confirm"

# Should return to landing screen — Clerk signOut is async, give it time
# "Get Started" is unique to the landing page (not found on settings/dashboard)
- extendedWaitUntil:
    visible: "Get Started"
    timeout: 30000

- assertVisible: "Sign In"

- takeScreenshot: 11_sign_out
