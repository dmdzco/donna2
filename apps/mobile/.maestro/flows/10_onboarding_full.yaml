# Flow 10: Full Onboarding (Fresh User)
# Creates a unique Clerk test account → completes all 5 onboarding steps → dashboard
# NOTE: This flow creates a new senior — run separately or last
#
# KEY LEARNINGS:
#   - Input component: use testID to reliably target TextInput fields.
#     The label <Text> and TextInput share the same accessibility text.
#   - hideKeyboard fails on iOS. Use pressKey:enter (single-line) to dismiss.
#   - For phone-pad keyboard (no Return key), tap a non-interactive heading.
#   - Between fields, just tap the next field directly — keyboard stays open.
#   - Before tapping fixed-bottom buttons (Next/Continue), dismiss keyboard first.

appId: com.donna.caregiver

---

- evalScript: '${output.freshOnboardingEmail = typeof TEST_ONBOARDING_EMAIL !== "undefined" && TEST_ONBOARDING_EMAIL ? TEST_ONBOARDING_EMAIL : "maestro-fresh-" + Date.now() + "+clerk_test@calldonna.co"}'
- evalScript: ${output.onboardingSeniorPhone = "555" + String(Date.now()).slice(-7)}
- evalScript: '${output.createPassword = typeof TEST_PASSWORD !== "undefined" && TEST_PASSWORD ? TEST_PASSWORD : "Dx7mQ9vLp2"}'

- stopApp
- launchApp:
    clearKeychain: true

- extendedWaitUntil:
    visible: "Get Started"
    timeout: 15000

# First tap can wake GestureHandlerRootView in dev builds; second navigates.
- tapOn:
    id: "landing-get-started"
- tapOn:
    id: "landing-get-started"
    optional: true

- extendedWaitUntil:
    visible: "Create Account"
    timeout: 10000

- tapOn:
    id: "create-account-email"
- eraseText: 50
- inputText: ${output.freshOnboardingEmail}

- tapOn:
    id: "create-account-password"
- runFlow:
    when:
      visible: "Automatic Strong Password.*"
    commands:
      - tapOn: "Automatic Strong Password.*"
      - runFlow:
          when:
            visible: "Choose My Own Password"
          commands:
            - tapOn: "Choose My Own Password"
- runFlow:
    when:
      visible: "Automatic Strong Password|Use Strong Password|Choose My Own Password"
    commands:
      - tapOn: "Choose My Own Password"
- tapOn:
    id: "create-account-password"
- eraseText: 80
- inputText: ${output.createPassword}
- runFlow:
    when:
      visible: "Automatic Strong Password.*"
    commands:
      - tapOn: "Automatic Strong Password.*"
      - runFlow:
          when:
            visible: "Choose My Own Password"
          commands:
            - tapOn: "Choose My Own Password"
      - tapOn:
          id: "create-account-password"
      - eraseText: 80
      - inputText: ${output.createPassword}

- tapOn:
    id: "create-account-submit"

- extendedWaitUntil:
    visible: "Save Password\\?|Verify Your Email|About You|Automatic Strong Password.*|Password must be at least 10 characters"
    timeout: 90000

- runFlow:
    when:
      visible: "Automatic Strong Password.*|Password must be at least 10 characters"
    commands:
      - tapOn:
          text: "Automatic Strong Password.*"
          optional: true
      - tapOn:
          point: "50%,41%"
      - runFlow:
          when:
            visible: "Choose My Own Password"
          commands:
            - tapOn: "Choose My Own Password"
      - tapOn:
          id: "create-account-password"
      - eraseText: 80
      - inputText: ${output.createPassword}
      - tapOn:
          id: "create-account-submit"
      - extendedWaitUntil:
          visible: "Save Password\\?|Verify Your Email|About You"
          timeout: 90000

- runFlow:
    when:
      visible: "Save Password\\?"
    commands:
      - tapOn: "Not Now"
      - extendedWaitUntil:
          visible: "Verify Your Email|About You"
          timeout: 15000

- runFlow:
    when:
      visible: "Verify Your Email"
    commands:
      - tapOn:
          id: "create-account-verification-code"
      - inputText: "424242"
      - tapOn:
          id: "create-account-verify-submit"
      - extendedWaitUntil:
          visible: "Save Password\\?|About You"
          timeout: 90000
      - runFlow:
          when:
            visible: "Save Password\\?"
          commands:
            - tapOn: "Not Now"

# ── Step 1: About You (Caregiver) ──
- extendedWaitUntil:
    visible: "About You"
    timeout: 10000

# Fields start empty — no eraseText needed. Use testID to target TextInput.
- tapOn:
    id: "input-first-name"
- inputText: "Jane"
- tapOn:
    id: "input-last-name"
- inputText: "Tester"
- tapOn:
    id: "input-phone"
- tapOn:
    id: "input-phone"
    optional: true
- inputText: "5551234567"

# Dismiss phone-pad keyboard (no Return key) by tapping non-interactive heading
- tapOn:
    text: "About You"
    index: 0
- tapOn: "Next"

# ── Step 2: About Your Loved One ──
- extendedWaitUntil:
    visible: "About Your Loved One"
    timeout: 10000

- tapOn:
    id: "input-their-name"
- inputText: "Margaret"
- pressKey: enter
- tapOn:
    id: "input-their-phone"
- tapOn:
    id: "input-their-phone"
    optional: true
- eraseText: 20
- inputText: ${output.onboardingSeniorPhone}

# Relationship picker
- tapOn: "Select relationship"
- extendedWaitUntil:
    visible: "Select Relationship"
    timeout: 5000
- tapOn: "Daughter"

- tapOn:
    id: "input-city"
- inputText: "Dallas"
- tapOn:
    id: "input-state"
- inputText: "TX"
- tapOn:
    id: "input-zipcode"
- inputText: "75201"

# Dismiss keyboard before tapping Next
- pressKey: enter
- tapOn: "Next"

# ── Step 3: Reminders ──
- extendedWaitUntil:
    visible: "Reminders"
    timeout: 10000

- tapOn:
    id: "input-reminder-title-0"
- inputText: "Morning medication"

# Dismiss keyboard then Continue
- pressKey: enter
- tapOn: "Continue"

# ── Step 4: Interests ──
- extendedWaitUntil:
    visible: "Interests"
    timeout: 10000

# Tap interest tile to expand it
- tapOn: "Music"
- extendedWaitUntil:
    visible: "Done"
    timeout: 3000
- tapOn: "e.g., jazz, Frank Sinatra, classical..."
- inputText: "Loves Frank Sinatra and jazz"
- tapOn:
    text: "Interests"
    index: 0
- tapOn: "Done"

- tapOn: "Gardening"
- extendedWaitUntil:
    visible: "Done"
    timeout: 3000
- tapOn: "e.g., roses, vegetable garden..."
- inputText: "Grows tomatoes and roses"
- tapOn:
    text: "Interests"
    index: 0
- tapOn: "Done"

# Scroll to Continue button
- scrollUntilVisible:
    element: "Continue"
    direction: DOWN
- tapOn: "Continue"

# ── Step 5: Schedule Donna ──
- extendedWaitUntil:
    visible: "Schedule Donna"
    timeout: 10000

# Default title and time are pre-selected — no changes needed
# Check the reminder checkbox if visible
- tapOn:
    text: "Morning medication"
    optional: true

# Tap Create Profile
- tapOn: "Create Profile"

# ── Success Screen ──
- extendedWaitUntil:
    visible: "Congratulations.*"
    timeout: 15000

- takeScreenshot: 10_onboarding_success

# Navigate to dashboard
- tapOn: "Continue to Homepage"

- extendedWaitUntil:
    visible: "Hello.*|Dashboard"
    timeout: 30000

- takeScreenshot: 10_onboarding_complete
