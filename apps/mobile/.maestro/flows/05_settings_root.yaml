# Flow 05: Settings Tab — Root Navigation
# Verifies: All settings rows visible, navigation to each sub-screen and back

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro+clerk_test@calldonna.co"
  TEST_PASSWORD: "Maestro2026!"

---

- runFlow: ../subflows/sign_in.yaml
- runFlow: ../subflows/navigate_to_settings.yaml

# Profiles section
- assertVisible: "Loved One Profile"
- assertVisible: "Caregiver Profile"

# Preferences section
- assertVisible: "Notification Preferences"
- assertVisible: "Help Center"

# Account section
- assertVisible: "Sign Out"

# App version
- assertVisible: "Donna v1.0.0"

# Navigate to each sub-screen and back
- tapOn: "Loved One Profile"
- assertVisible: "Go back"
- tapOn: "Go back"

- tapOn: "Caregiver Profile"
- assertVisible: "Go back"
- tapOn: "Go back"

- tapOn: "Notification Preferences"
- assertVisible: "Go back"
- tapOn: "Go back"

- tapOn: "Help Center"
- assertVisible: "Go back"
- tapOn: "Go back"

- takeScreenshot: 05_settings
