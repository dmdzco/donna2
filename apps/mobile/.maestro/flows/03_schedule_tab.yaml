# Flow 03: Schedule Tab
# Verifies: Tab navigation, week view, week navigation, add/edit/delete call

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro+clerk_test@getdonna.ai"
  TEST_PASSWORD: "Maestro2026!"

---

- runFlow: ../subflows/sign_in.yaml

# Navigate to Schedule tab
- tapOn: "Schedule"

# Week view header (current day name is visible)
- assertVisible:
    text: "Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday"

# Week navigation arrows
- assertVisible: "Previous week"
- assertVisible: "Next week"

# Navigate forward and back
- tapOn: "Next week"
- tapOn: "Previous week"

# --- Add a new call ---
- tapOn: "Add new call"

# Modal: frequency options visible
- assertVisible: "Daily|Recurring|One-Time"

# Select call title
- tapOn: "Select call title"
- tapOn: "Morning Check-in"

# Select time
- tapOn: "Select call time"
- tapOn: "9:00 AM"

# Add optional context
- tapOn: "Context notes"
- inputText: "E2E test call context"

# Save the call
- tapOn: "Add Call"

# Verify new call appears in schedule
- assertVisible: "Morning Check-in"

# --- Edit the call ---
- tapOn: "Edit Morning Check-in"

# Change context
- tapOn: "Context notes"
- eraseText: 50
- inputText: "Updated E2E context"
- tapOn: "Save Changes"

# --- Delete the test call (cleanup) ---
- tapOn: "Edit Morning Check-in"
- tapOn: "Delete Call"
- tapOn: "Delete"

- takeScreenshot: 03_schedule
