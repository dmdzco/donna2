# Manual Flow: Create Account
# Pass a unique Clerk test-mode email with:
# maestro test -e TEST_CREATE_EMAIL="maestro-create-<unique>+clerk_test@calldonna.co" .maestro/manual/auth_create_account.yaml

appId: com.donna.caregiver

---

- evalScript: ${output.createPassword = "Dx7mQ9vLp2"}

- stopApp
- launchApp:
    clearKeychain: true

- extendedWaitUntil:
    visible: "Get Started"
    timeout: 15000

# First tap can wake GestureHandlerRootView in dev builds; second navigates.
- tapOn:
    id: "landing-get-started"
- tapOn:
    id: "landing-get-started"
    optional: true

- extendedWaitUntil:
    visible: "Create Account"
    timeout: 10000

- tapOn:
    id: "create-account-email"
- eraseText: 50
- inputText: ${TEST_CREATE_EMAIL}

- tapOn:
    id: "create-account-password"
- runFlow:
    when:
      visible: "Automatic Strong Password.*"
    commands:
      - tapOn: "Automatic Strong Password.*"
      - runFlow:
          when:
            visible: "Choose My Own Password"
          commands:
            - tapOn: "Choose My Own Password"
- runFlow:
    when:
      visible: "Automatic Strong Password|Use Strong Password|Choose My Own Password"
    commands:
      - tapOn: "Choose My Own Password"
- tapOn:
    id: "create-account-password"
- eraseText: 80
- inputText: ${output.createPassword}
- runFlow:
    when:
      visible: "Automatic Strong Password.*"
    commands:
      - tapOn: "Automatic Strong Password.*"
      - runFlow:
          when:
            visible: "Choose My Own Password"
          commands:
            - tapOn: "Choose My Own Password"
      - tapOn:
          id: "create-account-password"
      - eraseText: 80
      - inputText: ${output.createPassword}

- tapOn:
    id: "create-account-submit"

- extendedWaitUntil:
    visible: "Save Password\\?|About You|Automatic Strong Password.*|Password must be at least 10 characters"
    timeout: 90000

- runFlow:
    when:
      visible: "Automatic Strong Password.*|Password must be at least 10 characters"
    commands:
      - tapOn:
          text: "Automatic Strong Password.*"
          optional: true
      - tapOn:
          point: "50%,41%"
      - runFlow:
          when:
            visible: "Choose My Own Password"
          commands:
            - tapOn: "Choose My Own Password"
      - tapOn:
          id: "create-account-password"
      - eraseText: 80
      - inputText: ${output.createPassword}
      - tapOn:
          id: "create-account-submit"
      - extendedWaitUntil:
          visible: "Save Password\\?|About You"
          timeout: 90000

- runFlow:
    when:
      visible: "Save Password\\?"
    commands:
      - tapOn: "Not Now"
      - extendedWaitUntil:
          visible: "About You"
          timeout: 15000

- extendedWaitUntil:
    visible: "About You"
    timeout: 90000
