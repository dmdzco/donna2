# Flow 02: Dashboard (Home Tab)
# Verifies: Greeting, next call card, recent calls, instant call FAB + modal

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro+clerk_test@getdonna.ai"
  TEST_PASSWORD: "Maestro2026!"

---

- runFlow: ../subflows/sign_in.yaml

# Should land on Dashboard tab by default
- assertVisible: "Dashboard"

# Greeting header (dynamic — contains caregiver's first name)
- assertVisible: "Hello.*"

# Next call card or empty state
- assertVisible: "Next Call|No calls scheduled"

# Recent calls section
- assertVisible: "Recent Calls"

# Floating call button (accessibilityLabel = "Call {name} now")
- assertVisible: "Call.*now"

# Tap call FAB → instant call modal appears
- tapOn: "Call.*now"
- assertVisible: "Call.*Now"

# Dismiss modal
- tapOn:
    text: "Close"
    optional: true
- back

# Verify we're still on dashboard
- assertVisible: "Dashboard"

- takeScreenshot: 02_dashboard
