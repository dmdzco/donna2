# Flow 04: Reminders Tab
# Verifies: Tab navigation, add/edit/delete reminder
#
# KEY LEARNINGS:
#   - Modal title and save button share text — use index: 1 for button.
#   - Title input has autoFocus — type directly after modal opens.
#   - hideKeyboard fails on iOS — use pressKey:enter for single-line.
#   - Keep form interaction minimal — only fill required fields.

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro+clerk_test@calldonna.co"
  TEST_PASSWORD: "Maestro2026!"

---

- runFlow: ../subflows/sign_in.yaml

# Navigate to Reminders tab
- tapOn: "Reminders, tab.*"

# Wait for screen to load
- extendedWaitUntil:
    visible: "Add New Reminder"
    timeout: 5000

# Static header
- assertVisible: "Reminders"

# Subtitle (dynamic — contains senior's first name)
- assertVisible: "Manage what Donna reminds.*about"

# --- Add a new reminder ---
- tapOn: "Add New Reminder"

# Title input has autoFocus — type directly, then press enter to dismiss keyboard
- inputText: "E2E Test Reminder"
- pressKey: enter

# Time picker regression: the native picker should open from the reminder sheet
# instead of getting stuck behind the modal.
- tapOn: "Select reminder time"
- extendedWaitUntil:
    visible: "Done selecting time"
    timeout: 5000
- tapOn: "Done selecting time"

# Save (index 1: skip modal title "Add Reminder", hit save button)
- tapOn:
    text: "Add Reminder"
    index: 1

# Verify reminder card's Edit button appears (confirms modal closed + saved)
- extendedWaitUntil:
    visible: "Edit E2E Test Reminder"
    timeout: 10000

# --- Edit the reminder ---
- tapOn: "Edit E2E Test Reminder"
- extendedWaitUntil:
    visible: "Edit Reminder"
    timeout: 5000

# Change title (autoFocus on the title field in edit mode too)
- eraseText: 50
- inputText: "E2E Updated Reminder"
- pressKey: enter

# Save
- tapOn: "Save Changes"

# Verify updated title
- extendedWaitUntil:
    visible: "E2E Updated Reminder"
    timeout: 5000

# --- Delete the reminder (cleanup) ---
- tapOn: "Delete E2E Updated Reminder"

# Confirmation modal
- extendedWaitUntil:
    visible: "Delete Reminder"
    timeout: 5000
- tapOn: "Delete Reminder"

# Verify removal
- extendedWaitUntil:
    notVisible: "E2E Updated Reminder"
    timeout: 5000

- takeScreenshot: 04_reminders
