# Flow 06: Settings — Loved One Profile
# Verifies: Form loads with data, edit fields, save, navigate back

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro+clerk_test@getdonna.ai"
  TEST_PASSWORD: "Maestro2026!"

---

- evalScript: ${output.lovedOnePhone = "555" + String(Date.now()).slice(-7)}

- runFlow: ../subflows/sign_in.yaml
- runFlow: ../subflows/navigate_to_settings.yaml
- tapOn: "Loved One Profile"

# Form fields are visible and pre-filled
- assertVisible: "Name"
- assertVisible: "Phone Number"
- assertVisible: "City"
- assertVisible: "State"

# Edit name field
- tapOn:
    id: "loved-one-name-input"
- eraseText: 50
- inputText: "E2E Test Senior"

# Edit phone
- tapOn:
    id: "loved-one-phone-input"
- eraseText: 50
- inputText: ${output.lovedOnePhone}

# Edit city
- tapOn:
    id: "loved-one-city-input"
- eraseText: 50
- inputText: "Dallas"

# Edit state
- tapOn:
    id: "loved-one-state-input"
- eraseText: 50
- inputText: "TX"
- pressKey: enter

# Scroll to interests section
- scrollUntilVisible:
    element: "Additional Topics"
    direction: DOWN

# Scroll to topics to avoid
- scrollUntilVisible:
    element: "Topics to Avoid"
    direction: DOWN

# Save changes
- scrollUntilVisible:
    element: "Save Changes"
    direction: DOWN
- tapOn: "Save Changes"

# Successful save navigates back to settings root.
- extendedWaitUntil:
    visible: "Manage your account and preferences"
    timeout: 10000

- takeScreenshot: 06_loved_one
