# Flow 10: Full Onboarding (Fresh User)
# Signs in with fresh clerk_test account → completes all 5 onboarding steps → dashboard
# NOTE: This flow creates a new senior — run separately or last

appId: com.donna.caregiver

env:
  TEST_EMAIL: "maestro-fresh+clerk_test@getdonna.ai"
  TEST_PASSWORD: "MaestroFresh2026"

---

# Sign in (reuse subflow — handles stopApp, clearKeychain, double-tap, 2FA)
- runFlow: ../subflows/sign_in.yaml

# ── Step 1: About You (Caregiver) ──
- extendedWaitUntil:
    visible: "About You"
    timeout: 10000

- tapOn: "Jane"
- inputText: "Jane"
- tapOn: "Doe"
- inputText: "Tester"
- tapOn: "jane@example.com"
- inputText: "jane+clerk_test@getdonna.ai"
- tapOn: "(555) 123-4567"
- inputText: "5551234567"

# Dismiss keyboard then tap Next
- tapOn: "About You"
- tapOn: "Next"

# ── Step 2: About Your Loved One ──
- extendedWaitUntil:
    visible: "About Your Loved One"
    timeout: 10000

- tapOn: "Margaret"
- inputText: "Margaret"
- tapOn: "(555) 987-6543"
- inputText: "5559876543"

# Relationship picker
- tapOn: "Select relationship"
- extendedWaitUntil:
    visible: "Select Relationship"
    timeout: 5000
- tapOn: "Daughter"

- tapOn: "Dallas"
- inputText: "Dallas"
- tapOn:
    text: "TX"
    index: 0
- inputText: "TX"
- tapOn: "75201"
- inputText: "75201"

# Dismiss keyboard then tap Next
- tapOn: "About Your Loved One"
- tapOn: "Next"

# ── Step 3: Reminders ──
- extendedWaitUntil:
    visible: "Reminders"
    timeout: 10000

- tapOn: "e.g., Take morning medication"
- inputText: "Morning medication"
- tapOn: "e.g., Take the blue pill with breakfast. It's on the kitchen counter."
- inputText: "Take the blue pill with breakfast"

# Dismiss keyboard then tap Continue
- tapOn: "Reminders"
- tapOn: "Continue"

# ── Step 4: Interests ──
- extendedWaitUntil:
    visible: "Interests"
    timeout: 10000

# Select interests — tapping a tile expands it with a detail text field
- tapOn: "Music"
- extendedWaitUntil:
    visible: "Done"
    timeout: 3000
- inputText: "Loves Frank Sinatra and jazz"
- tapOn: "Done"

- tapOn: "Gardening"
- extendedWaitUntil:
    visible: "Done"
    timeout: 3000
- inputText: "Grows tomatoes and roses"
- tapOn: "Done"

# Scroll down to Continue button
- scrollUntilVisible:
    element: "Continue"
    direction: DOWN
- tapOn: "Continue"

# ── Step 5: Schedule Donna ──
- extendedWaitUntil:
    visible: "Schedule Donna"
    timeout: 10000

# Default title "Daily Call" and time "9:00 AM" are fine
# Check the reminder checkbox if visible
- tapOn:
    text: "Morning medication"
    optional: true

# Tap Create Profile
- tapOn: "Create Profile"

# ── Success Screen ──
- extendedWaitUntil:
    visible: "Congratulations"
    timeout: 15000

- takeScreenshot: 10_onboarding_success

- tapOn: "Continue to Homepage"

# Should land on dashboard (API call to create senior takes a few seconds)
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 30000

- takeScreenshot: 10_onboarding_complete
